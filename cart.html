<!DOCTYPE html>
<html>
<head>
<title>Cart - Luxe Scent</title>
<link rel="icon" type="image/jpeg" href="Perfume.jpg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="cart.css">
</head>

<body>

<!-- Navbar -->
<header>
<div class="logo">LUXE SCENT</div>

<nav>
<a href="index.html">Home</a>
<a href="collection1.html">Collection</a>
<a href="about.html">About</a>
<a href="cart.html">Cart</a>
<a href="login.html">Login</a>
</nav>
</header>

<!-- Cart Section -->
<div class="cart-wrap">

<!-- LEFT -->
<div class="cart-items">
<h2>Your Cart</h2>
<div id="cartItems"></div>
</div>

<!-- RIGHT -->
<div class="cart-summary">
<h2>Order Summary</h2>

<div class="summary-row">
<span>Subtotal</span>
<span id="subtotal">₹0</span>
</div>

<div class="summary-row total">
<span>Total</span>
<span id="total">₹0</span>
</div>

<button id="checkoutBtn">Proceed to Checkout</button>

</div>

</div>

<!-- Footer -->
<footer>
<p>© 2026 Luxe Scent</p>
</footer>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function getProductImage(item) {
if (item.image) {
return item.image;
}

if (item.productId) {
return item.productId + ".jpg";
}

return "";
}

function renderCart(){

let container = document.getElementById("cartItems");
container.innerHTML = "";

let total = 0;

if(cart.length === 0){
container.innerHTML = `
<p class="empty">Your cart is empty</p>
<a href="collection1.html" class="continue-btn">← Continue Shopping</a>
`;
return;
}

cart.forEach((item,index)=>{

let productImage = getProductImage(item);
if (!item.image && productImage) {
item.image = productImage;
}

let div = document.createElement("div");
div.classList.add("cart-item");

div.innerHTML = `
<img src="${productImage}" alt="${item.name}">

<div class="info">
<h3>${item.name}</h3>
<p>₹${item.price}</p>

<div class="qty">
<button onclick="decrease(${index})">−</button>
<span>${item.quantity}</span>
<button onclick="increase(${index})">+</button>
</div>

</div>

<div class="right">
<span>₹${item.price * item.quantity}</span>
</div>
`;

container.appendChild(div);

total += item.price * item.quantity;

});

localStorage.setItem("cart", JSON.stringify(cart));

document.getElementById("subtotal").innerText = "₹" + total;
document.getElementById("total").innerText = "₹" + total;
}

function increase(i){
cart[i].quantity++;
save();
}

function decrease(i){
if(cart[i].quantity > 1){
cart[i].quantity--;
}else{
cart.splice(i,1);
}
save();
}

function save(){
localStorage.setItem("cart", JSON.stringify(cart));
renderCart();
}

function isUserLoggedIn() {
return localStorage.getItem("isLoggedIn") === "true";
}

document.getElementById("checkoutBtn").addEventListener("click", function () {
if (cart.length === 0) {
alert("Your cart is empty. Add items before checkout.");
return;
}

if (!isUserLoggedIn()) {
alert("Please login to continue checkout.");
window.location.href = "login.html";
return;
}

window.location.href = "payment.html";
});

renderCart();

</script>

</body>
</html>
